name: Build Core Municipal Blazor

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore
        run: dotnet restore CoreMunicipalBlazor.csproj
      - name: Build
        run: dotnet build CoreMunicipalBlazor.csproj --configuration Release --no-restore
